services:
  sophia-medication-service:
    build: .
    container_name: sophia-medication-service
    env_file:
      - .env
    ports:
      - '3003:3003'
    depends_on:
      - medication-postgres
    restart: always
    networks:
      - net1

  medication-postgres:
    image: postgres:15
    container_name: medication-postgres
    env_file:
      - .env
    ports:
      - '5434:5432'
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - medication_postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - net1

networks:
  net1:
    external: true
    name: net1

volumes:
  medication_postgres_data:
